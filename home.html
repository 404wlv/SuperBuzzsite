<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  
</head>

<body class="bg-fuchsia-300 text-white">

    <!-- HomePage -->
    <div id="main-app" class="flex flex-col md:flex-row h-screen">

      <div id="event"
        class="grid grid-cols-1 sm:grid-cols-1 md:grid-cols-2 gap-4 p-4 overflow-y-auto h-screen z-40">
      </div>

      <!-- Event Modal -->
      <div id="event-modal" class="modal hidden fixed inset-0 flex items-center justify-center bg-black/50 z-50">
        <div class="bg-white text-fuchsia-800 p-4 sm:p-6 rounded-2xl w-full max-w-full sm:max-w-md relative">
            <button id="close-event-modal" class="absolute top-3 right-3 text-xl font-bold">✕</button>
            <h2 id="event-title" class="text-xl sm:text-2xl font-bold mb-2"></h2>
            <p id="event-category" class="text-sm mb-2"></p>
            <p id="event-description" class="mb-4 text-sm sm:text-base"></p>
            <p id="event-location" class="text-sm mb-2"></p>
            <p id="event-date" class="text-sm mb-4"></p>
            <button id="attend-btn" class="bg-fuchsia-700 text-white px-3 py-1 rounded-xl text-sm w-full sm:w-auto">
                Attend Event
            </button>
        </div>
      </div>

    </div>

    <!-- Gym Modal -->
    <div id="gym-modal" class="modal hidden fixed inset-0 flex items-center justify-center bg-black/50 z-50">
      <div class="bg-fuchsia-200 w-full max-w-full sm:max-w-md p-6 sm:p-8 rounded-2xl shadow-2xl border border-[#334155] relative">
          <h2 class="text-xl sm:text-2xl font-bold mb-4 text-center text-fuchsia-800">Gym Timings</h2>
          <h3 class="mb-2">Next Gym Sessions:</h3>
          <ul class="list-disc list-inside text-fuchsia-800"></ul>
      </div>
    </div>

    <!-- Library Modal -->
    <div id="library-modal" class="modal hidden fixed inset-0 flex items-center justify-center bg-black/50 z-50">
      <div class="bg-fuchsia-200 w-full max-w-full sm:max-w-md p-6 sm:p-8 rounded-2xl shadow-2xl border border-[#334155] relative">
          <h2 class="text-xl sm:text-2xl font-bold mb-4 text-center text-fuchsia-800">Library Timings</h2>
          <h3 class="mb-2">Next Library Sessions:</h3>
          <ul class="list-disc list-inside text-fuchsia-800"> 
            <li>Study Room 1: 5:00 PM</li>
            <li>Study Room 2: 6:30 PM</li>
            <li>Computer Lab: 7:00 PM</li>
          </ul>
      </div>
    </div>

    <!-- Bus Modal -->
    <div id="bus-modal" class="modal hidden fixed inset-0 flex items-center justify-center bg-black/50 z-50">
      <div class="bg-fuchsia-200 w-full max-w-full sm:max-w-md p-6 sm:p-8 rounded-2xl shadow-2xl border border-[#334155] relative">
          <h2 class="text-xl sm:text-2xl font-bold mb-4 text-center text-fuchsia-800">Bus Timings</h2>
          <h3 class="mb-2">Next Bus Departures:</h3>
          <ul class="list-disc list-inside text-fuchsia-800"></ul>
      </div>
    </div>

    <!-- Chat box -->
    <div id="chatbox" class="fixed right-2 sm:right-6 bottom-20 bg-fuchsia-200 w-[90%] sm:w-full max-w-md p-4 sm:p-6 rounded-2xl shadow-2xl border border-[#334155] flex flex-col gap-3 hidden z-50">
      <h3 class="text-xl sm:text-2xl font-bold text-fuchsia-800">ChatBox</h3>
      <div id="chat-messages" class="flex-1 bg-white rounded-xl p-3 overflow-y-auto text-fuchsia-800"></div>
      <input id="chat-input" type="text" placeholder="Type a message..." class="p-2 sm:p-3 rounded-xl border border-[#334155] text-fuchsia-800 focus:outline-none focus:ring-2 focus:ring-fuchsia-500 w-full">
      <button id="chat-send" class="bg-fuchsia-700 text-white px-3 py-1 rounded-xl mt-2 w-full sm:w-auto">Send</button>
    </div>

    <!-- Chat Button -->
    <button id="chat-toggle" class="fixed right-2 sm:right-6 bottom-6 z-50 bg-fuchsia-800 text-white px-4 py-3 rounded-2xl shadow-xl hover:scale-110 transition">
        Chat Now
    </button>

    <!-- Sidebar Toggle -->
    <button id="sidebar-toggle" class="fixed top-6 left-6 z-30 bg-fuchsia-800 text-white px-4 py-3 rounded-2xl shadow-xl hover:scale-110 transition">
        ᯓ
    </button>

    <!-- Add Event -->
    <button id="add-event-button" class="fixed bottom-6 left-6 z-50 bg-fuchsia-700 py-3 px-6 rounded-2xl shadow-xl hover:scale-110 transition">
        + Create Event
    </button>

  <script type="module" src="js/home.js"></script>
</body>
</html>
