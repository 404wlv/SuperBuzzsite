<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  
</head>

<body class="bg-fuchsia-300 text-white">

    <!-- HomePage -->
    <div id="main-app"
      class="flex flex-col md:flex-row h-screen">

      <div id="events-container"
        class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4 overflow-y-auto h-screen z-40">

                
        <div class="bg-white text-fuchsia-800 p-6 rounded-2xl w-full max-w-lg max-h-[80vh] overflow-y-auto relative">

          <button id="close-event-modal"
            class="absolute top-3 right-3 text-xl font-bold">
            ✕
          </button>

          <h2 id="modal-title" class="text-2xl font-bold mb-2"></h2>

          <p id="modal-category" class="text-sm mb-2"></p>

          <p id="modal-description" class="mb-4"></p>

          <p id="modal-location" class="text-sm mb-2"></p>

          <p id="modal-date" class="text-sm mb-4"></p>

          <button class="bg-fuchsia-700 text-white px-4 py-2 rounded-xl">
            Attend Event
          </button>

        </div>
      </div>
    </div>

    <!---- Gym Timings -->
    <div id="gym-modal" 
      class="modal hidden flex-initial flex justify-center">
      <div class="relative flex flex-col sm:flex-row gap-6">

        <div class="bg-fuchsia-200 w-full max-w-md p-12 sm:p-16 rounded-2xl shadow-2xl border border-[#334155] flex flex-col gap-6">

            <h2 class="text-2xl font-bold mb-6 text-center text-fuchsia-800">
                Gym Timings
            </h2>

            <h3>Next Gym Sessions:</h3>
            <ul class="list-disc list-inside text-fuchsia-800"> 
            </ul>
        </div>
      </div>
    </div>

    <!-- Chat box -->
    <div id="chatbox" class="fixed right-6 bg-fuchsia-200 w-full max-w-md p-6 sm:p-8 rounded-2xl shadow-2xl border border-[#334155] flex flex-col gap-4 hidden">

      <h3 class="text-2xl font-bold text-fuchsia-800">ChatBox</h3>

      <div id="chat-messages" class="flex-1 bg-white rounded-xl p-3 overflow-y-auto text-fuchsia-800">
          <!-- messages go here -->
      </div>

      <input id="chat-input" type="text"
          placeholder="Type a message..."
          class="p-3 rounded-xl border border-[#334155] text-fuchsia-800 focus:outline-none focus:ring-2 focus:ring-fuchsia-500 w-full">

  </div>

    <!-- Chat Button -->
    <button id="chat-toggle"
        class="fixed right-6 bottom-6 z-50 bg-fuchsia-800 text-white px-4 py-3 rounded-2xl shadow-xl hover:scale-110 transition">
        Chat Now
    </button>



    <!-- Sidebar -->
    <div id="sidebar" 
        class="fixed top-0 left-0 h-full w-60 bg-fuchsia-900 p-6 text-white transform -translate-x-full transition-transform duration-300 ease-in-out overflow-auto z-40">

        <button id="sidebar-back" class="text-white px-2 py-1 bg-white/10 rounded hover:bg-white/20 mb-4">
            ← Back
        </button>

        <button id="profile-button" class="w-full text-left py-3 px-4 rounded-lg hover:bg-fuchsia-800 transition mb-2">
            Profile
        </button>
        
        <button id="bus-timings" class="w-full text-left py-3 px-4 rounded-lg hover:bg-fuchsia-800 transition mb-2">
            Bus Timings
        </button>

        <button id="gym-timings" class="w-full text-left py-3 px-4 rounded-lg hover:bg-fuchsia-800 transition mb-2">
            Gym Timings
        </button>

        <button id="map-button" class="w-full text-left py-3 px-4 rounded-lg hover:bg-fuchsia-800 transition mb-2">
            Map
        </button>

        <button id="library-timings" class="w-full text-left py-3 px-4 rounded-lg hover:bg-fuchsia-800 transition mb-2">
            Library Timings
        </button>

    </div>

    <!-- Sidebar Toggle -->
    <button id="sidebar-toggle"
        class="fixed top-6 left-6 z-50 bg-fuchsia-800 text-white px-4 py-3 rounded-2xl shadow-xl hover:scale-110 transition">
        ᯓ
    </button>

    <!-- Add Event -->
    <button id="add-event-button"
        class="fixed bottom-6 left-6 z-50 bg-fuchsia-700 py-3 px-6 rounded-2xl shadow-xl hover:scale-110 transition">
        + Create Event
    </button>

  


  


  <!-- Library -->
   <div id="library-modal" 
      class="modal hidden flex-initial flex justify-center">
      <div class="relative flex flex-col sm:flex-row gap-6">

        <div class="bg-fuchsia-200 w-full max-w-md p-12 sm:p-16 rounded-2xl shadow-2xl border border-[#334155] flex flex-col gap-6">

          <h2 class="text-2xl font-bold mb-6 text-center text-fuchsia-800">
            Library Timings
          </h2>

          <h3>Next Library Sessions:</h3>
          <ul class="list-disc list-inside text-fuchsia-800"> 

            <li>Study Room 1: 5:00 PM</li>
            <li>Study Room 2: 6:30 PM</li>
            <li>Computer Lab: 7:00 PM</li>
          </ul>
        

        </div>
      </div>
    </div>

    <!-- bus timings -->
   <div id="bus-modal" 
      class="modal hidden flex-initial flex justify-center">
      <div class="relative flex flex-col sm:flex-row gap-6">

        <div class="bg-fuchsia-200 w-full max-w-md p-12 sm:p-16 rounded-2xl shadow-2xl border border-[#334155] flex flex-col gap-6">

          <h2 class="text-2xl font-bold mb-6 text-center text-fuchsia-800">
            Bus Timings
          </h2>

          <h3>Next Bus Departures:</h3>
          <ul class="list-disc list-inside text-fuchsia-800"> 
          </ul>
        

        </div>
      </div>
    </div>


  <script type="module" src="js/home.js"></script>
</body>
</html>
