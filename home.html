<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title class="text-3xl">SuperBuzz</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-fuchsia-300 text-white">

    <!-- HomePage -->
    <div id="main-app"
        class="modal hidden flex flex-col md:flex-row h-screen">


        <button id="add-event-button"
            class="fixed bottom-6 left-6 bg-fuchsia-700 py-3 px-6 rounded-2xl shadow-xl hover:scale-110 transition">
            + Create Event
        </button> 

    </div>

    <!---- Gym Timings -->
    <div id="gym-modal" 
      class="modal hidden flex-initial flex justify-center">
      <div class="relative flex flex-col sm:flex-row gap-6">

        <div class="bg-fuchsia-200 w-full max-w-md p-12 sm:p-16 rounded-2xl shadow-2xl border border-[#334155] flex flex-col gap-6">

          <h2 class="text-2xl font-bold mb-6 text-center text-fuchsia-800">
            Gym Timings
          </h2>

          <h3>Next Gym Sessions:</h3>
          <ul class="list-disc list-inside text-fuchsia-800"> 

            <li>Yoga: 6:00 PM</li>
            <li>Spin Class: 7:30 PM</li>
            <li>Weightlifting: 8:00 PM</li>
          </ul>
        

        </div>
      </div>
    </div>

    <!-- Chat box -->
     <div id="chatbox"
         class="fixed right-6 bg-fuchsia-200 w-full max-w-md p-6 sm:p-8 rounded-2xl shadow-2xl border border-[#334155] flex flex-col gap-4 hidden">

        <h3 class="text-2xl font-bold text-fuchsia-800">ChatBox</h3>

        <div class="flex-1 bg-white rounded-xl p-3 overflow-y-auto text-fuchsia-800">
        <!-- messages go here -->
        </div>

        <input type="text"
            placeholder="Type a message..."
            class="p-3 rounded-xl border border-[#334155] text-fuchsia-800 focus:outline-none focus:ring-2 focus:ring-fuchsia-500 w-full">

      </div>

      <!-- Chat Button -->
      <button id="chat-toggle"
        class="fixed right-6 bottom-6 bg-fuchsia-800 text-white px-4 py-3 rounded-2xl shadow-xl hover:scale-110 transition">
        Chat Now
      </button>

      <!-- Sidebar -->
      <div id="sidebar" 
        class="fixed top-0 left-0 h-full w-60 bg-fuchsia-900 p-6 text-white transform -translate-x-full transition-transform duration-300 ease-in-out z-40">
      
      <button id="profile-button" class="w-full text-left py-3 px-4 rounded-lg hover:bg-fuchsia-800 transition mb-2">
        Profile
      </button>
      
      <button id="bus-timings" class="w-full text-left py-3 px-4 rounded-lg hover:bg-fuchsia-800 transition mb-2">
        Bus Timings
      </button>

      <button id="gym-timings" class="w-full text-left py-3 px-4 rounded-lg hover:bg-fuchsia-800 transition mb-2">
        Gym Timings
      </button>

        <button id="map-button" class="w-full text-left py-3 px-4 rounded-lg hover:bg-fuchsia-800 transition mb-2">
          Map
        </button>

        <button id="library-timings" class="w-full text-left py-3 px-4 rounded-lg hover:bg-fuchsia-800 transition mb-2">
          Library Timings
        </button>

        <button id="weather-button" class="w-full text-left py-3 px-4 rounded-lg hover:bg-fuchsia-800 transition mb-2">
          🌤
        </button>
      </div>
    <button id="sidebar-toggle"
      class="fixed top-6 left-6 bg-fuchsia-800 text-white px-4 py-3 rounded-2xl shadow-xl hover:scale-110 transition">
      ᯓ
    </button>
  </div>

  


  <!-- Map -->


  <!-- Library -->
   <div id="library-modal" 
      class="modal hidden flex-initial flex justify-center">
      <div class="relative flex flex-col sm:flex-row gap-6">

        <div class="bg-fuchsia-200 w-full max-w-md p-12 sm:p-16 rounded-2xl shadow-2xl border border-[#334155] flex flex-col gap-6">

          <h2 class="text-2xl font-bold mb-6 text-center text-fuchsia-800">
            Library Timings
          </h2>

          <h3>Next Library Sessions:</h3>
          <ul class="list-disc list-inside text-fuchsia-800"> 

            <li>Study Room 1: 5:00 PM</li>
            <li>Study Room 2: 6:30 PM</li>
            <li>Computer Lab: 7:00 PM</li>
          </ul>
        

        </div>
      </div>
    </div>

   
  <!-- Weather for clothes? -->

  <script type="module" src="js/main.js"></script>
</body>
</html>
