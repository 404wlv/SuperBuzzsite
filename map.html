<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>

<body>

  <!-- Home Button -->
  <button id="home-btn"
    style="
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 1000;
      background: #701a75;
      color: white;
      padding: 10px 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    ">
    Home
  </button>

  <!-- Map container -->
  <div id="map" class="h-screen w-full" style="height:100vh;"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Your JS -->
  <script src="js/map.js"></script>

  <!-- Home Button Script -->
  <script>
    document.getElementById("home-btn").addEventListener("click", () => {
      window.location.href = "home.html"; // change if your file name is different
    });
  </script>

  <style>
    .custom-entrance {
      font-size: 24px;
      filter: drop-shadow(0 3px 5px rgba(0,0,0,0.3));
      transition: transform 0.2s;
    }

    .custom-entrance:hover {
      transform: scale(1.3);
    }
  </style>

</body>
</html>
